apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-k8s-practice
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Take-st/argocd-k8s-practice
    targetRevision: HEAD
    path: overlays/development
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      selfHeal: false
      prune: true
